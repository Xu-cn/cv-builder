<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 44" fill="none">
  <!-- Constellation dots -->
  <circle cx="8"  cy="14" r="2.5" fill="white"/>
  <circle cx="18" cy="7"  r="2.5" fill="white"/>
  <circle cx="30" cy="5"  r="2.5" fill="white"/>
  <circle cx="21" cy="19" r="2"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="10" cy="26" r="2"   fill="rgba(255,255,255,0.4)"/>
