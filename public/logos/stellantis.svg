  <text x="42" y="23" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="800" fill="white" letter-spacing="2">STELLANTIS</text>
  <text x="42" y="35" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" letter-spacing="1.5">GROUPE AUTOMOBILE</text>
